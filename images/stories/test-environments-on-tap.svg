<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="One data generator filling a private database for each tester">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1526"/>
      <stop offset="1" stop-color="#132238"/>
    </linearGradient>
    <linearGradient id="dbBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b3252"/>
      <stop offset="1" stop-color="#12233c"/>
    </linearGradient>
    <linearGradient id="pipe" gradientUnits="userSpaceOnUse" x1="235" y1="0" x2="540" y2="0">
      <stop offset="0" stop-color="#57d7be"/>
      <stop offset="1" stop-color="#78aefc"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2e49" stroke-width="1"/>
    </pattern>
    <g id="db">
      <path d="M-52 -30 v60 a52 16 0 0 0 104 0 v-60" fill="url(#dbBody)" stroke="#78aefc" stroke-width="2.5"/>
      <ellipse cx="0" cy="-30" rx="52" ry="16" fill="#1f3a5f" stroke="#78aefc" stroke-width="2.5"/>
      <path d="M-52 -8 a52 16 0 0 0 104 0" fill="none" stroke="#3b5a86" stroke-width="2"/>
      <path d="M-52 14 a52 16 0 0 0 104 0" fill="none" stroke="#3b5a86" stroke-width="2"/>
    </g>
    <g id="laptop">
      <rect x="-46" y="-32" width="92" height="58" rx="6" fill="#0e1c31" stroke="#57d7be" stroke-width="2.5"/>
      <path d="M-58 26 h116 l10 12 a4 4 0 0 1 -4 5 h-128 a4 4 0 0 1 -4 -5 z" fill="#1b3252" stroke="#57d7be" stroke-width="2.5"/>
      <text x="-36" y="-12" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="13" fill="#57d7be">$ run tests</text>
      <text x="-36" y="8" font-family="ui-monospace, 'Cascadia Code', Menlo, monospace" font-size="13" fill="#78aefc">db: mine ✓</text>
    </g>
    <g id="valve">
      <circle r="11" fill="#132238" stroke="#57d7be" stroke-width="2.5"/>
      <path d="M0 -11 V-20 M-8 -20 H8" stroke="#57d7be" stroke-width="2.5" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <!-- generator tank -->
  <g transform="translate(150,315)">
    <rect x="-85" y="-110" width="170" height="220" rx="18" fill="#12233c" stroke="#78aefc" stroke-width="3"/>
    <ellipse cx="0" cy="-78" rx="52" ry="14" fill="none" stroke="#3b5a86" stroke-width="2"/>
    <!-- gear -->
    <g stroke="#57d7be" stroke-width="3" fill="#132238">
      <circle r="26"/>
      <g stroke-linecap="round">
        <path d="M0 -26 V-38"/><path d="M0 26 V38"/><path d="M-26 0 H-38"/><path d="M26 0 H38"/>
        <path d="M-18.4 -18.4 L-26.9 -26.9"/><path d="M18.4 18.4 L26.9 26.9"/>
        <path d="M-18.4 18.4 L-26.9 26.9"/><path d="M18.4 -18.4 L26.9 -26.9"/>
      </g>
      <circle r="9" fill="#0b1526"/>
    </g>
    <text y="72" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#afbdd3">data</text>
    <text y="94" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#afbdd3">generator</text>
  </g>

  <!-- manifold from generator -->
  <path d="M235 315 H330" fill="none" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>
  <path d="M330 137 V493" fill="none" stroke="#3b5a86" stroke-width="8" stroke-linecap="round"/>

  <!-- three lanes: pipe -> valve -> db -> link -> laptop -->
  <g>
    <path d="M330 137 H540" fill="none" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>
    <use href="#valve" x="420" y="137"/>
    <use href="#db" x="590" y="137"/>
    <path d="M645 137 H795" fill="none" stroke="#57d7be" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
    <use href="#laptop" x="885" y="137"/>
    <text x="1000" y="145" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#afbdd3">tester 1</text>
  </g>
  <g>
    <path d="M330 315 H540" fill="none" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>
    <use href="#valve" x="420" y="315"/>
    <use href="#db" x="590" y="315"/>
    <path d="M645 315 H795" fill="none" stroke="#57d7be" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
    <use href="#laptop" x="885" y="315"/>
    <text x="1000" y="323" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#afbdd3">tester 2</text>
  </g>
  <g>
    <path d="M330 493 H540" fill="none" stroke="url(#pipe)" stroke-width="8" stroke-linecap="round"/>
    <use href="#valve" x="420" y="493"/>
    <use href="#db" x="590" y="493"/>
    <path d="M645 493 H795" fill="none" stroke="#57d7be" stroke-width="4" stroke-dasharray="2 10" stroke-linecap="round"/>
    <use href="#laptop" x="885" y="493"/>
    <text x="1000" y="501" font-family="ui-monospace, Menlo, monospace" font-size="16" fill="#afbdd3">tester 3</text>
  </g>

  <!-- droplets from valves, a nod to "on tap" -->
  <g fill="#57d7be" opacity="0.85">
    <path d="M420 168 q6 10 0 16 q-6 -6 0 -16z"/>
    <path d="M420 346 q6 10 0 16 q-6 -6 0 -16z"/>
    <path d="M420 524 q6 10 0 16 q-6 -6 0 -16z"/>
  </g>
</svg>
