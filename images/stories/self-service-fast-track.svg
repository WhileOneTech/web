<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="A visual work queue where a card is being moved to the front by its owner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1526"/>
      <stop offset="1" stop-color="#132238"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#1c2e49" stroke-width="1"/>
    </pattern>
    <g id="card">
      <rect x="-70" y="-55" width="140" height="110" rx="12" fill="#12233c" stroke-width="3"/>
      <rect x="-52" y="-32" width="104" height="12" rx="6" opacity="0.9"/>
      <rect x="-52" y="-6" width="76" height="10" rx="5" opacity="0.45"/>
      <rect x="-52" y="16" width="90" height="10" rx="5" opacity="0.45"/>
    </g>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)" opacity="0.55"/>

  <!-- build zone: first card locked in, being worked on -->
  <g transform="translate(150,340)" stroke="#57d7be" fill="#57d7be">
    <use href="#card"/>
    <!-- gear: in progress -->
    <g transform="translate(44,-38)" stroke-width="2.5" fill="#132238">
      <circle r="12"/>
      <g stroke-linecap="round">
        <path d="M0 -12 V-18"/><path d="M0 12 V18"/><path d="M-12 0 H-18"/><path d="M12 0 H18"/>
      </g>
      <circle r="4" fill="#0b1526" stroke="none"/>
    </g>
  </g>
  <text x="150" y="465" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#57d7be">building — locked</text>

  <!-- fence between started and queue -->
  <path d="M285 230 V450" stroke="#3b5a86" stroke-width="4" stroke-dasharray="10 10" stroke-linecap="round"/>

  <!-- queue lane -->
  <path d="M330 430 H1120" stroke="#3b5a86" stroke-width="4" stroke-linecap="round"/>
  <text x="725" y="465" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#afbdd3">not started — sales reorder freely</text>

  <!-- queued cards, each a different salesperson colour -->
  <g transform="translate(420,340)" stroke="#78aefc" fill="#78aefc"><use href="#card"/></g>
  <g transform="translate(600,340)" stroke="#e8c268" fill="#e8c268"><use href="#card"/></g>
  <!-- gap at 780 where the pink card lifted out -->
  <rect x="712" y="287" width="136" height="106" rx="12" fill="none" stroke="#3b5a86" stroke-width="2.5" stroke-dasharray="6 8"/>
  <g transform="translate(960,340)" stroke="#9d8cff" fill="#9d8cff"><use href="#card"/></g>

  <!-- the fast-tracked card: lifted, tilted, moving to front of queue -->
  <g transform="translate(760,160) rotate(-6)" stroke="#ff8fb2" fill="#ff8fb2">
    <use href="#card"/>
  </g>
  <!-- motion arc to front of queue -->
  <path d="M672 150 C 560 100, 460 160, 428 258" fill="none" stroke="#ff8fb2" stroke-width="5" stroke-dasharray="3 12" stroke-linecap="round"/>
  <path d="M446 232 L428 258 L414 230" fill="none" stroke="#ff8fb2" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- cursor doing the drag: sales, not engineering -->
  <g transform="translate(806,196)">
    <path d="M0 0 L0 30 L8 23 L14 36 L21 32 L15 20 L26 19 Z" fill="#eef4ff" stroke="#0b1526" stroke-width="2"/>
  </g>
</svg>
