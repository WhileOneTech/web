<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ccaa;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Modern geometric W shape -->
  <path d="M 20 25 L 30 75 L 40 45 L 50 75 L 60 45 L 70 75 L 80 25" 
        stroke="url(#gradient)" 
        stroke-width="8" 
        fill="none" 
        stroke-linecap="round" 
        stroke-linejoin="round"/>
  
  <!-- Accent circle for "1" or "One" -->
  <circle cx="85" cy="25" r="5" fill="url(#gradient)"/>
</svg>
